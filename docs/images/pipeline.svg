<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" width="1400" height="360">
  <defs>
    <filter id="stageShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect width="1400" height="360" fill="#0A0E1A"/>

  <!-- Title -->
  <text x="40" y="38" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6B7280" letter-spacing="4">EXECUTION PIPELINE  ·  VIDEO → JSON</text>
  <text x="40" y="68" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#F3F4F6">From mp4 to predicted cortical response in seven stages</text>

  <!-- Phase legend -->
  <g transform="translate(40, 88)" font-family="'JetBrains Mono', monospace" font-size="10">
    <g>
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#5BC0EB"/>
      <text x="16" y="9" fill="#9CA3AF">INPUT</text>
    </g>
    <g transform="translate(80, 0)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#FFB627"/>
      <text x="16" y="9" fill="#9CA3AF">PREPROCESS</text>
    </g>
    <g transform="translate(190, 0)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#E55D87"/>
      <text x="16" y="9" fill="#9CA3AF">INFERENCE  ·  GPU</text>
    </g>
    <g transform="translate(335, 0)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#9BC53D"/>
      <text x="16" y="9" fill="#9CA3AF">PROCESSING  ·  CPU</text>
    </g>
    <g transform="translate(490, 0)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#7E5BEF"/>
      <text x="16" y="9" fill="#9CA3AF">OUTPUT</text>
    </g>
  </g>

  <!-- Stage cards: 7 stages, each ~170 wide x 160 tall, gap ~20 -->
  <!-- Total: 7 x 170 + 6 x 20 = 1310; start at 45 to center -->
  <g transform="translate(45, 145)" font-family="Inter, system-ui, sans-serif">

    <!-- Stage 1: Video -->
    <g filter="url(#stageShadow)">
      <rect x="0" y="0" width="170" height="160" rx="12" fill="#0F1626" stroke="#1F2937"/>
      <rect x="0" y="0" width="170" height="28" rx="12" fill="#5BC0EB"/>
      <rect x="0" y="20" width="170" height="8" fill="#5BC0EB"/>
      <text x="14" y="19" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#0A0E1A" letter-spacing="2">STAGE 1</text>
      <text x="85" y="60" font-size="22" text-anchor="middle">🎬</text>
      <text x="85" y="88" font-size="14" font-weight="700" fill="#F3F4F6" text-anchor="middle">Video input</text>
      <text x="85" y="108" font-size="10" fill="#9CA3AF" text-anchor="middle">.mp4 / any ffmpeg-</text>
      <text x="85" y="122" font-size="10" fill="#9CA3AF" text-anchor="middle">readable container</text>
      <line x1="14" y1="134" x2="156" y2="134" stroke="#1F2937"/>
      <text x="85" y="150" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#5BC0EB" text-anchor="middle">5.3s @ 30fps</text>
    </g>

    <!-- Arrow 1 -->
    <line x1="174" y1="80" x2="186" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Stage 2: Preprocess -->
    <g transform="translate(190, 0)" filter="url(#stageShadow)">
      <rect x="0" y="0" width="170" height="160" rx="12" fill="#0F1626" stroke="#1F2937"/>
      <rect x="0" y="0" width="170" height="28" rx="12" fill="#FFB627"/>
      <rect x="0" y="20" width="170" height="8" fill="#FFB627"/>
      <text x="14" y="19" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#0A0E1A" letter-spacing="2">STAGE 2</text>
      <text x="85" y="60" font-size="22" text-anchor="middle">✂️</text>
      <text x="85" y="88" font-size="14" font-weight="700" fill="#F3F4F6" text-anchor="middle">Preprocess</text>
      <text x="85" y="108" font-size="10" fill="#9CA3AF" text-anchor="middle">ffmpeg normalize +</text>
      <text x="85" y="122" font-size="10" fill="#9CA3AF" text-anchor="middle">WhisperX events</text>
      <line x1="14" y1="134" x2="156" y2="134" stroke="#1F2937"/>
      <text x="85" y="150" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#FFB627" text-anchor="middle">720×1280 · 30fps</text>
    </g>

    <line x1="364" y1="80" x2="376" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Stage 3: TRIBE -->
    <g transform="translate(380, 0)" filter="url(#stageShadow)">
      <rect x="0" y="0" width="170" height="160" rx="12" fill="#0F1626" stroke="#1F2937"/>
      <rect x="0" y="0" width="170" height="28" rx="12" fill="#E55D87"/>
      <rect x="0" y="20" width="170" height="8" fill="#E55D87"/>
      <text x="14" y="19" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#0A0E1A" letter-spacing="2">STAGE 3</text>
      <text x="85" y="60" font-size="22" text-anchor="middle">🧠</text>
      <text x="85" y="88" font-size="14" font-weight="700" fill="#F3F4F6" text-anchor="middle">TRIBE v2 forward</text>
      <text x="85" y="108" font-size="10" fill="#9CA3AF" text-anchor="middle">Llama 3.2 · V-JEPA2</text>
      <text x="85" y="122" font-size="10" fill="#9CA3AF" text-anchor="middle">+ W2V-BERT</text>
      <line x1="14" y1="134" x2="156" y2="134" stroke="#1F2937"/>
      <text x="85" y="150" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#E55D87" text-anchor="middle">A100 · ~3 min</text>
    </g>

    <line x1="554" y1="80" x2="566" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Stage 4: Vertex predictions -->
    <g transform="translate(570, 0)" filter="url(#stageShadow)">
      <rect x="0" y="0" width="170" height="160" rx="12" fill="#0F1626" stroke="#1F2937"/>
      <rect x="0" y="0" width="170" height="28" rx="12" fill="#E55D87"/>
      <rect x="0" y="20" width="170" height="8" fill="#E55D87"/>
      <text x="14" y="19" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#0A0E1A" letter-spacing="2">STAGE 4</text>
      <text x="85" y="60" font-size="22" text-anchor="middle">📍</text>
      <text x="85" y="88" font-size="14" font-weight="700" fill="#F3F4F6" text-anchor="middle">Vertex preds</text>
      <text x="85" y="108" font-size="10" fill="#9CA3AF" text-anchor="middle">(T, 20484) on the</text>
      <text x="85" y="122" font-size="10" fill="#9CA3AF" text-anchor="middle">fsaverage5 mesh</text>
      <line x1="14" y1="134" x2="156" y2="134" stroke="#1F2937"/>
      <text x="85" y="150" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#E55D87" text-anchor="middle">float32 tensor</text>
    </g>

    <line x1="744" y1="80" x2="756" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Stage 5: Aggregate -->
    <g transform="translate(760, 0)" filter="url(#stageShadow)">
      <rect x="0" y="0" width="170" height="160" rx="12" fill="#0F1626" stroke="#1F2937"/>
      <rect x="0" y="0" width="170" height="28" rx="12" fill="#9BC53D"/>
      <rect x="0" y="20" width="170" height="8" fill="#9BC53D"/>
      <text x="14" y="19" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#0A0E1A" letter-spacing="2">STAGE 5</text>
      <text x="85" y="60" font-size="22" text-anchor="middle">🗺️</text>
      <text x="85" y="88" font-size="14" font-weight="700" fill="#F3F4F6" text-anchor="middle">Aggregate to Yeo</text>
      <text x="85" y="108" font-size="10" fill="#9CA3AF" text-anchor="middle">Mean per parcel,</text>
      <text x="85" y="122" font-size="10" fill="#9CA3AF" text-anchor="middle">medial wall dropped</text>
      <line x1="14" y1="134" x2="156" y2="134" stroke="#1F2937"/>
      <text x="85" y="150" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#9BC53D" text-anchor="middle">(T, 17)</text>
    </g>

    <line x1="934" y1="80" x2="946" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Stage 6: 5-network rollup -->
    <g transform="translate(950, 0)" filter="url(#stageShadow)">
      <rect x="0" y="0" width="170" height="160" rx="12" fill="#0F1626" stroke="#1F2937"/>
      <rect x="0" y="0" width="170" height="28" rx="12" fill="#9BC53D"/>
      <rect x="0" y="20" width="170" height="8" fill="#9BC53D"/>
      <text x="14" y="19" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#0A0E1A" letter-spacing="2">STAGE 6</text>
      <text x="85" y="60" font-size="22" text-anchor="middle">🎯</text>
      <text x="85" y="88" font-size="14" font-weight="700" fill="#F3F4F6" text-anchor="middle">5-network rollup</text>
      <text x="85" y="108" font-size="10" fill="#9CA3AF" text-anchor="middle">z-score per atlas,</text>
      <text x="85" y="122" font-size="10" fill="#9CA3AF" text-anchor="middle">group into 5</text>
      <line x1="14" y1="134" x2="156" y2="134" stroke="#1F2937"/>
      <text x="85" y="150" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#9BC53D" text-anchor="middle">(T, 5)</text>
    </g>

    <line x1="1124" y1="80" x2="1136" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Stage 7: ScoreResult JSON -->
    <g transform="translate(1140, 0)" filter="url(#stageShadow)">
      <rect x="0" y="0" width="170" height="160" rx="12" fill="#0F1626" stroke="#1F2937"/>
      <rect x="0" y="0" width="170" height="28" rx="12" fill="#7E5BEF"/>
      <rect x="0" y="20" width="170" height="8" fill="#7E5BEF"/>
      <text x="14" y="19" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#0A0E1A" letter-spacing="2">STAGE 7</text>
      <text x="85" y="60" font-size="22" text-anchor="middle">📄</text>
      <text x="85" y="88" font-size="14" font-weight="700" fill="#F3F4F6" text-anchor="middle">ScoreResult</text>
      <text x="85" y="108" font-size="10" fill="#9CA3AF" text-anchor="middle">Pydantic v2 JSON</text>
      <text x="85" y="122" font-size="10" fill="#9CA3AF" text-anchor="middle">+ full provenance</text>
      <line x1="14" y1="134" x2="156" y2="134" stroke="#1F2937"/>
      <text x="85" y="150" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#7E5BEF" text-anchor="middle">schema 1.0</text>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="700" y="335" font-family="'JetBrains Mono', monospace" font-size="10" fill="#4B5563" text-anchor="middle" letter-spacing="2">STAGES 4-7 ARE PURE NUMPY  ·  RUN OFFLINE WITHOUT GPU VIA score_from_predictions()</text>
</svg>
